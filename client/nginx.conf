# Server block สำหรับ localhost (HTTP)
server {
    listen       80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ =404;
    }

    location ~ /.well-known/acme-challenge {
        allow all;
        root   /usr/share/nginx/html;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

# Server block สำหรับ redirect HTTP ไป HTTPS
server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;
    return 301 https://$host$request_uri;
}

# Server block สำหรับ HTTPS
server {
    listen 443 ssl;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    ssl_certificate /ssl/fullchain.pem;
    ssl_certificate_key /ssl/privkey.pem;
    ssl_dhparam /ssl/dhparam-2048.pem;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # เพิ่ม HSTS เพื่อบังคับ HTTPS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Root location
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Assets
    location /kk1/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri $uri/ =404;
    }

    # Proxy ไปยัง backend
    location /itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kk1/itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # KK1 location
    location /kk1/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /kk1/index.html;
    }

    # ควบคุม cache สำหรับ index.html
    location = /kk1/index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";
    }
}