events {}

http {
    server {
        listen 80;
        server_name ip24kk1.sit.kmutt.ac.th; 

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }
location /itb-mshop/ {
    alias /usr/share/nginx/html/itb-mshop/;
    index index.html;
    try_files $uri $uri/ /itb-mshop/index.html;
    add_header Cache-Control no-cache;
}
    }
}