server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    root /usr/share/nginx/html/kk1; 
    index index.html;

    location /kk1/ {
        try_files $uri $uri/ /kk1/index.html;  
        add_header Cache-Control "no-cache";   
    }

    location /kk1/itb-mshop/v1/ {
        proxy_pass http://backend:8080/kk1/itb-mshop/v1/;
        proxy_set_header Host $host;
    }
}

