server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    

    location / {
        root /usr/share/nginx/html/kk1; 
    }

    
    location /kk1/{
        # alias /usr/share/nginx/html/kk1/;
        try_files $uri $uri/ /index.html;  
        add_header Cache-Control "no-cache"; 

    }

    location /kk1/index.html {
        alias /usr/share/nginx/html/kk1/index.html;
        add_header Cache-Control "no-cache"; 
    }

    location /kk1/itb-mshop/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}


