server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to /kk1/
    location = / {
        return 302 /kk1/;
    }

    # Frontend (SPA)
    location /kk1/ {
        # ใช้ alias เพื่อชี้ไปที่ /usr/share/nginx/html/ โดยตรง
        # เพราะ Vite สร้าง index.html ใน /app/dist/ ไม่ได้อยู่ใน /app/dist/kk1/
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Backend
    location /kk1/itb-mshop/ {
        proxy_pass http://backend:8080/kk1/itb-mshop/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}