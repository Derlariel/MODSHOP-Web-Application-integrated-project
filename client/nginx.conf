server {
    listen 443 ssl;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    ssl_certificate /etc/nginx/ssl/your_cert.pem;
    ssl_certificate_key /etc/nginx/ssl/your_key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html; 
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /kk1/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri $uri/;
    }

    location /itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
    }

    location /kk1/itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
    }

    location /kk1/ {
        root /usr/share/nginx/html/; 
        try_files $uri $uri/ /kk1/index.html;
    }

    location /kk1/index.html {
        alias /usr/share/nginx/html/index.html;
        add_header Cache-Control "no-cache"; 
    }
}