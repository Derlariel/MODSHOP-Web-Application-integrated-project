server {
    listen 80;
    server_name ip24kk1.sit.kmutt.ac.th;

    root /usr/share/nginx/html;
    index index.html;

    localtion =  / {
        return 302 /kk1/;
    }

    # location / {
    #     root /usr/share/nginx/html/;
    #     index index.html;
    #     try_files $uri $uri/ /index.html;
    #      add_header Cache-Control "no-cache";
    # }

    # Frontend 
    localtion /kk1/ {;
        try_files $uri $uri/ /kk1/index.html;
    }

    # Backend
    localtion /itb-mshop/ {
        proxy_pass http://backend:8080;
    }

    
}