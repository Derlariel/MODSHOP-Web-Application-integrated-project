server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

     location /kk1/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /kk1/index.html;
    }

    location ~ ^/kk1/assets/.*\.(js|css|png|jpe?g|webp|svg|woff2?|ttf|eot)$ {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /kk1/itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
        proxy_set_header Access-Control-Allow-Origin *;  
    }

    location /itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
        proxy_set_header Access-Control-Allow-Origin *;
    }

}