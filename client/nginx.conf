server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th;

    location /kk1/itb-mshop/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}