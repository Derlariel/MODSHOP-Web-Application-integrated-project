server {
    listen       80;
    server_name  localhost ip24kk1.sit.kmutt.ac.th;

    #access_log  /var/log/nginx/host.access.log  main;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    location ~ /.well-known/acme-challenge {
        allow all;
        root   /usr/share/nginx/html;
    }

    #error_page  404              /404.html;

    # redirect server error pages to the static page /50x.html
    #
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}

server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    ssl_certificate /ssl/fullchain.pem;
    ssl_certificate_key /ssl/privkey.pem;
    ssl_dhparam /ssl/dhparam-2048.pem;
    ssl_session_cache    shared:SSL:1m;
    ssl_session_timeout  5m;
    ssl_protocols  TLSv1.2 TLSv1.3;
    ssl_ciphers  HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers  on;

    # redirect root ไป /kk1/ เพื่อไม่ให้เจอ Welcome to nginx!
    location = / {
        return 302 /kk1/;
    }

    location /kk1/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri $uri/;
    }

    location /itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
    }

    location /kk1/itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
    }

    location /kk1/ {
        root /usr/share/nginx/html/; 
        try_files $uri $uri/ /kk1/index.html;
    }

    location /kk1/index.html {
        alias /usr/share/nginx/html/index.html;
        add_header Cache-Control "no-cache"; 
    }
}