# Server block สำหรับ HTTP (port 80) — ให้บริการเฉพาะ frontend แบบไม่ redirect
server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /kk1/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri $uri/ =404;
    }

    # Internal proxy ไป backend ผ่าน HTTP
    location /itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Server block สำหรับ HTTPS (port 443) — ให้ผู้ใช้เข้าภายนอก
server {
    listen 443 ssl;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    ssl_certificate /ssl/fullchain.pem;
    ssl_certificate_key /ssl/privkey.pem;
    ssl_dhparam /ssl/dhparam-2048.pem;

    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /kk1/assets/ {
        alias /usr/share/nginx/html/assets/;
        try_files $uri $uri/ =404;
    }

    # Proxy internal backend ผ่าน HTTP (ไม่บังคับ HTTPS)
    location /itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kk1/itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /kk1/ {
        try_files $uri $uri/ /kk1/index.html;
    }

    location = /kk1/index.html {
        add_header Cache-Control "no-cache";
    }
}
