server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th;

    root /usr/share/nginx/html/kk1; 
    index index.html;

    # Frontend SPA routing
    location /kk1/itb-mshop/ {
        try_files $uri $uri/ /kk1/itb-mshop/index.html;
        add_header Cache-Control "no-cache";
    }

    # Backend API
    location /kk1/itb-mshop/v1/ {
        proxy_pass http://backend:8080/kk1/itb-mshop/v1/;  # note the full path
        proxy_set_header Host $host;
    }
}
