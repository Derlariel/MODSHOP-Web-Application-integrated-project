server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th;

    # ⚠️ เสิร์ฟ static files ตรง /kk1/itb-mshop/*
    location ^~ /kk1/itb-mshop/assets/ {
        root /usr/share/nginx/html;
        access_log off;
    }

    location = /kk1/itb-mshop/vite.svg {
        root /usr/share/nginx/html;
        access_log off;
    }

    # ✅ เสิร์ฟ index.html เมื่อไม่มี static asset
    location /kk1/itb-mshop/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /kk1/itb-mshop/index.html;
        add_header Cache-Control "no-cache";
    }

    # 🔁 proxy ไปที่ backend สำหรับ API
    location /kk1/itb-mshop/v1/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
