server {
    listen 80;
    server_name intproj24.sit.kmutt.ac.th ip24kk1.sit.kmutt.ac.th;

    location /kk1/itb-mshop/ {
        proxy_pass http://api:8080/itb-mshop/;
        proxy_set_header Host $host;
    }

    location / {
        root /usr/share/nginx/html; 
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /kk1/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /kk1/index.html;
        add_header Cache-Control "no-cache";
    }
}