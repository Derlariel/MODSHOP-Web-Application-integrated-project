spring.application.name=mobile-shop
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.data.jdbc.dialect=mysql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.datasource.url=jdbc:mysql://database:3306/mobile_shop?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
server.servlet.context-path=/itb-mshop
spring.jackson.time-zone=Asia/Bangkok
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# Default profile
spring.profiles.active=dev