name: Deploy kk1 test cypress PBI 11 x

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Check current user.
        run: whoami

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Auto Deploy container application itb-mshop 
        run: |
          set -x  
          cd /home/sysadmin/2-2567_INT221_KK-1

          git pull https://napatzzz:${{ secrets.GH_PAH_TOKEN }}@github.com/Derlariel/2-2567_INT221_KK-1.git main

          rm -f ./secrets/db_password
          mkdir -p ./secrets
          echo "${{ secrets.DB_PASSWORD }}" > ./secrets/db_password
          # sudo chown 100:101 ./secrets/db_password
          # sudo chmod 400 ./secrets/db_password

          docker compose down -v
          docker compose build --no-cache
          docker compose up -d
          docker image prune -f
          # docker builder prune -f
