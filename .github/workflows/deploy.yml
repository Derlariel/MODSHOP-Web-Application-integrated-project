name: Deploy to Self-Hosted Runner

on:
  push:
    branches:
      - pre-dev

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Auto Deploy container application itb-mshop kk1
        run: |
          set -x  
          cd /home/sysadmin/2-2567_INT221_KK-1 
          git pull origin pre-dev
          cd client
          npm i
          npm run build 
          docker compose down -v
          docker compose up -d --build
