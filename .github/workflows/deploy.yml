name: Deploy to Self-Hosted Runner

on:
  push:
    branches:
      - dev  

jobs:
  deploy:
    runs-on: self-hosted  

    steps:
      - name: Checkout code
        uses: actions/checkout@v3 

      - name: Deploy application
        run: |
          set -x  
          cd /home/sysadmin/2-2567_INT221_KK-1 
          git pull origin main
          docker compose down 
          docker compose up -d --build  
