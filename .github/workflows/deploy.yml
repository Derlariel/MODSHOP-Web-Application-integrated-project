name: Deploy kk1 update clear cache

on:
  push:
    branches:
      - pre-dev

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Auto Deploy container application itb-mshop 
        run: |
          set -x  
          cd /home/sysadmin/2-2567_INT221_KK-1
          rm -f .env
          git pull https://napatzzz:${{ secrets.GH_PAH_TOKEN }}@github.com/Derlariel/2-2567_INT221_KK-1.git pre-dev

          mkdir -p ./secrets
          echo "${{ secrets.DB_PASSWORD }}" > ./secrets/db_password
          chmod 600 ./secrets/db_password  

          docker compose down -v
          docker compose build --no-cache
          docker compose up -d
          docker image prune -f
          # docker builder prune -f
