services:
  frontend:
    container_name: frontend
    build:
      context: ./client
      args:
        - NODE_ENV=production
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/dohttps/nginx/ssl/fullchain.pem:/ssl/fullchain.pem:ro
      - /home/dohttps/nginx/ssl/privkey.pem:/ssl/privkey.pem:ro
      - /home/dohttps/nginx/ssl/dhparam-2048.pem:/ssl/dhparam-2048.pem:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend-network
      - frontend-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
        reservations:
          memory: 16M
    restart: unless-stopped
    
  database:
    build: 
      context: ./database
    container_name: database
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./secrets/db_password:/run/secrets/db_password:ro
    networks:
      - backend-network
    expose:
      - "3306"
    healthcheck:
      test: ["CMD","mysqladmin", "ping", "-h", "database"]
      interval: 20s
      timeout: 20s
      retries: 5
      start_period: 40s 
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          memory: 400M
    restart: unless-stopped
 

  api:
    build:
      context: ./server
    container_name: backend
    expose:
      - "8080"
    depends_on:
      database:
        condition: service_healthy   
    networks:
      - frontend-network
      - backend-network
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_PASSWORD_FILE=/run/secrets/db_password
      - TZ=Asia/Bangkok
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          memory: 256M
    restart: unless-stopped 
    volumes:
      - ./secrets/db_password:/run/secrets/db_password:ro

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  mysql_data:
    driver: local
