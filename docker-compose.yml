services:
  frontend:
    build: 
      context: ./client
      dockerfile: docker-frontend
    ports:
     - "80:80"
    networks:
    - kk1-network
  database:
    build: 
      context: ./database
      dockerfile: docker-database
    container_name: database
    environment:
     - MYSQL_ROOT_PASSWORD=root
    networks:
     - kk1-network
    ports:
     - "3306:3306"
    healthcheck:
      test: ["CMD","mysqladmin", "ping", "-h", "database"]
      interval: 20s
      timeout: 20s
      retries: 5
      start_period: 40s 
  api:
    build:
      context: ./server
      dockerfile: docker-backend
    container_name: api
    ports:
      - "8000:8080"
    depends_on:
      database:
        condition: service_healthy   
    networks:
      - kk1-network

networks:
  kk1-network:
    driver: bridge